<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ATP Extreme Matches{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    {% block header %}{% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Consistent Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <div class="container">
            <div class="row text-center">
                <div class="col">
                    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                        <i class="bi bi-house-door fs-4"></i><br>Home
                    </a>
                </div>
                <div class="col">
                    <a href="/dominant" class="{% if request.path == '/dominant' %}active{% endif %}">
                        <i class="bi bi-trophy fs-4"></i><br>Dominant
                    </a>
                </div>
                <div class="col">
                    <a href="/upsets" class="{% if request.path == '/upsets' %}active{% endif %}">
                        <i class="bi bi-graph-up-arrow fs-4"></i><br>Upsets
                    </a>
                </div>
                <div class="col">
                    <a href="/rate" class="{% if request.path == '/rate' %}active{% endif %}">
                        <i class="bi bi-bar-chart-line fs-4"></i><br>Win Rates
                    </a>
                </div>
                 <div class="col">
                    <a href="/recents" class="{% if request.path == '/recents' %}active{% endif %}">
                        <i class="bi bi-arrow-repeat fs-4"></i><br>Recent Matches
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
